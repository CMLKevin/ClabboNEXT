services:
  arcturus:
    build:
      context: arcturus
    env_file:
      - .env
    volumes:
      - ./assets/:/app/assets/
    ports:
      #- 3000:3000 # gameport
      #- 3001:3001 # rcon
      - 2096:2096 # websocket port
    depends_on:
      - db
    restart: unless-stopped
    networks: [nitro]

  nitro:
    build:
      context: nitro
    env_file:
      - .env
    volumes:
      - ./nitro/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nitro/renderer-config.json:/usr/share/nginx/html/renderer-config.json
      - ./nitro/ui-config.json:/usr/share/nginx/html/ui-config.json
    ports:
      - 3000:80
    restart: unless-stopped
    networks: [nitro]

  agent-gateway:
    build:
      context: services/agent-gateway
    profiles: ["agents"]
    environment:
      - PORT=8787
      - HOST=0.0.0.0
      - NODE_ENV=production
      - LOG_LEVEL=info
      - CLABO_PUBLIC_URL=${CLABO_PUBLIC_URL:-http://127.0.0.1:8787}
      - CLABO_APP_NAME=${CLABO_APP_NAME:-Clabo}
      - CLABO_AUTH_HEADER_NAME=${CLABO_AUTH_HEADER_NAME:-X-Clabbo-Agent-Identity}
      - CLABO_AUTH_ISSUER=${CLABO_AUTH_ISSUER:-clabbo.identity}
      - CLABO_AUTH_AUDIENCE=${CLABO_AUTH_AUDIENCE:-clabo.local}
      - CLABO_AUTH_CURRENT_KID=${CLABO_AUTH_CURRENT_KID:-v1}
      - CLABO_AUTH_KEYS=${CLABO_AUTH_KEYS:-v1:replace_me_with_long_secret}
      - CLABO_AUTH_TOKEN_MAX_TTL_SECONDS=${CLABO_AUTH_TOKEN_MAX_TTL_SECONDS:-3600}
      - CLABO_AUTH_CLOCK_SKEW_SECONDS=${CLABO_AUTH_CLOCK_SKEW_SECONDS:-30}
      - CLABO_AUTH_VERIFY_CACHE_TTL_SECONDS=${CLABO_AUTH_VERIFY_CACHE_TTL_SECONDS:-30}
      - CLABO_AUTH_VERIFY_CACHE_MAX_ENTRIES=${CLABO_AUTH_VERIFY_CACHE_MAX_ENTRIES:-5000}
      - CLABO_AUTH_ALLOW_TOKEN_ISSUE_ENDPOINT=${CLABO_AUTH_ALLOW_TOKEN_ISSUE_ENDPOINT:-false}
      - CLABO_RUNTIME_POLICY=${CLABO_RUNTIME_POLICY:-hybrid}
      - CLABO_REQUIRE_E2B_FOR_EXTERNAL=${CLABO_REQUIRE_E2B_FOR_EXTERNAL:-true}
      - CLABO_ALLOWED_CAPABILITIES=${CLABO_ALLOWED_CAPABILITIES:-session.validate,session.start,session.end,session.status,room.chat.send,room.chat.shout,room.chat.whisper,room.user.movement,room.user.expression,room.settings.manage,room.mod.kick,room.mod.mute,room.mod.ban,room.rights.grant,room.rights.revoke,room.poll.manage,room.poll.vote,room.pet.manage,room.furni.interact,room.furni.manage,room.trade.manage,room.bot.manage,room.queue.change,workspace.read,workspace.write}
      - CLABO_SESSION_TTL_SECONDS=${CLABO_SESSION_TTL_SECONDS:-3600}
      - CLABO_REPLAY_TTL_SECONDS=${CLABO_REPLAY_TTL_SECONDS:-600}
      - CLABO_RATE_LIMIT_MAX=${CLABO_RATE_LIMIT_MAX:-120}
      - CLABO_RATE_LIMIT_WINDOW_SECONDS=${CLABO_RATE_LIMIT_WINDOW_SECONDS:-60}
      - CLABO_INTERNAL_SERVICE_KEY=${CLABO_INTERNAL_SERVICE_KEY:-}
      - CLABO_ACTION_DRIVER=${CLABO_ACTION_DRIVER:-noop}
      - CLABO_ACTION_BRIDGE_URL=${CLABO_ACTION_BRIDGE_URL:-}
      - CLABO_ACTION_BRIDGE_TIMEOUT_MS=${CLABO_ACTION_BRIDGE_TIMEOUT_MS:-5000}
      - CLABO_ACTION_BRIDGE_TOKEN=${CLABO_ACTION_BRIDGE_TOKEN:-}
      - CLABO_ACTION_REDIS_STREAM_KEY=${CLABO_ACTION_REDIS_STREAM_KEY:-clabo:actions:stream}
      - CLABO_ACTION_EXECUTION_TTL_SECONDS=${CLABO_ACTION_EXECUTION_TTL_SECONDS:-86400}
      - CLABO_ACTION_EXECUTION_TIMEOUT_MS=${CLABO_ACTION_EXECUTION_TIMEOUT_MS:-15000}
      - CLABO_ACTION_EXECUTION_MAX_RETRIES=${CLABO_ACTION_EXECUTION_MAX_RETRIES:-2}
      - CLABO_ACTION_EXECUTION_RETRY_BACKOFF_MS=${CLABO_ACTION_EXECUTION_RETRY_BACKOFF_MS:-300}
      - CLABO_ACTION_SESSION_RATE_LIMIT_PER_MINUTE=${CLABO_ACTION_SESSION_RATE_LIMIT_PER_MINUTE:-180}
      - CLABO_ACTION_REQUIRE_APPROVAL_FOR_HIGH_RISK=${CLABO_ACTION_REQUIRE_APPROVAL_FOR_HIGH_RISK:-true}
      - CLABO_ACTION_MAX_BATCH_SIZE=${CLABO_ACTION_MAX_BATCH_SIZE:-25}
      - CLABO_WORKFLOW_EXECUTION_TTL_SECONDS=${CLABO_WORKFLOW_EXECUTION_TTL_SECONDS:-86400}
      - CLABO_WORKFLOW_QUEUE_KEY=${CLABO_WORKFLOW_QUEUE_KEY:-clabo:workflow:queue}
      - CLABO_WORKFLOW_QUEUE_LOCK_SECONDS=${CLABO_WORKFLOW_QUEUE_LOCK_SECONDS:-120}
      - CLABO_WORKFLOW_DRAIN_MAX_ITEMS=${CLABO_WORKFLOW_DRAIN_MAX_ITEMS:-12}
      - CLABO_WORKFLOW_DRAIN_TIME_BUDGET_MS=${CLABO_WORKFLOW_DRAIN_TIME_BUDGET_MS:-25000}
      - CLABO_WORKFLOW_ASYNC_ENABLED=${CLABO_WORKFLOW_ASYNC_ENABLED:-true}
      - CLABO_REQUEST_EXECUTION_BUDGET_MS=${CLABO_REQUEST_EXECUTION_BUDGET_MS:-240000}
      - CLABO_ALLOW_IN_MEMORY_STATE_IN_PRODUCTION=${CLABO_ALLOW_IN_MEMORY_STATE_IN_PRODUCTION:-true}
      - CLABO_ALLOW_NOOP_ACTION_DRIVER_IN_PRODUCTION=${CLABO_ALLOW_NOOP_ACTION_DRIVER_IN_PRODUCTION:-true}
      - REDIS_URL=${CLABO_REDIS_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - CRON_SECRET=${CRON_SECRET:-}
      - E2B_API_KEY=${E2B_API_KEY:-}
      - CLABO_E2B_API_KEY=${CLABO_E2B_API_KEY:-}
    ports:
      - 8787:8787
    restart: unless-stopped
    networks: [nitro]

  db:
    image: mysql:8
    depends_on:
      - backup
    env_file:
      - .env
    ports:
      - 3310:3306
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/conf.d:/etc/mysql/conf.d
      - ./db/dumps:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks: [nitro]

  backup:
    image: tiredofit/db-backup:4.0.19
    volumes:
      - ./db/backup:/backup
    environment:
      - TIMEZONE=UTC
      - CONTAINER_ENABLE_MONITORING=FALSE
      - DEFAULT_LOG_LEVEL=WARN

      - DEFAULT_CREATE_LATEST_SYMLINK=FALSE
      - BACKUP_JOB_CONCURRENCY=1
      - DEFAULT_CHECKSUM=SHA1
      - DEFAULT_COMPRESSION=GZ
      - DEFAULT_BACKUP_INTERVAL=1440
      - DEFAULT_BACKUP_BEGIN=0315
      - DEFAULT_CLEANUP_TIME=10080

      - DB01_TYPE=mysql
      - DB01_HOST=db
      - DB01_USER=$MYSQL_USER
      - DB01_PASS=$MYSQL_PASSWORD
      - DB01_NAME=$MYSQL_DATABASE
    restart: unless-stopped
    networks: [nitro]

  assets:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - imager
      - imgproxy
    env_file:
      - .env
    ports:
      - 8080:80
    volumes:
      - ./assets/nginx:/etc/nginx/conf.d/
      - ./assets/:/usr/share/nginx/html
    networks: [nitro]

  imager:
    build:
      context: imager
    env_file:
      - .env
    volumes:
      - ./assets/:/app/assets/
    restart: unless-stopped
    networks: [nitro]

  imgproxy:
    image: ghcr.io/willnorris/imageproxy
    volumes:
      - "./assets/usercontent/imageproxy/cache:/tmp/imageproxy"
    env_file:
      - .env
    restart: unless-stopped
    networks: [nitro]

  cms:
    build:
      context: atomcms
    depends_on:
      - assets
      - arcturus
    ports:
      - "8081:8080"
    volumes:
      - "./.cms.env:/var/www/html/.env"
      - "./atomcms/storage:/var/www/html/storage/app/public"
      - "./atomcms/logs:/var/www/html/storage/logs"
      - "./atomcms/gamedata:/var/www/html/public/gamedata"
    restart: unless-stopped
    networks: [nitro]

networks:
  nitro:
